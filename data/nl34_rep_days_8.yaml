method:
  options:
    total_periods: 365
    representative_periods: 8
    time_steps_per_period: 24
    sampling_time: "Hour(1)"
    mandatory_periods: []

  optimization:
    integral_weights: false
    binary_ordering: true
    equal_weights: false

    duration_curve_error:
      weight: 1.0
      number_bins: 10
      type: "absolute"

results:
  save_results: true
  result_dir: "repdays_8-unequal_weights"
  create_plots: true

time_series:
  default:
    csv_options:
      delim: ","
    timestamp: "snapshot"
    sampling_time: "Hour(1)"

  Load:
    source: "nl34_total_load_timeseries.csv"
    value_column: "load"
    weight: 1.0

